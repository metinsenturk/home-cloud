name: Home Server

services:
  traefik:
    image: traefik:v3.6
    container_name: traefik
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --log.level=INFO
      - --api.dashboard=true
      # - --api.insecure=true
      - --ping=true
    ports:
      - "80:80"
      - "443:443"
      # - "8080:8080" # Traefik dashboard
    networks:
      - home_network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.${DOMAIN}`)"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.entrypoints=web"
    environment:
      - TZ=${TZ}
      - DOMAIN=${DOMAIN}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    # Dozzle provides a simple web UI for viewing Docker container logs in real-time.
    # It requires access to the Docker socket to read logs from all containers.
    networks:
      - home_network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dozzle.rule=Host(`logs.${DOMAIN}`)"
      - "traefik.http.services.dozzle.loadbalancer.server.port=8080"
    environment:
      - TZ=${TZ}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
    healthcheck:
      test: ["CMD", "/dozzle", "healthcheck"]
      interval: 3s
      timeout: 5s
      retries: 5
      start_period: 5s

  wud:
    image: getwud/wud:latest
    container_name: wud
    restart: unless-stopped
    # What's Up Docker monitors Docker images for updates and provides a web UI.
    # It requires access to the Docker socket to watch containers and check for updates.
    networks:
      - home_network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wud.rule=Host(`updates.${DOMAIN}`)"
      - "traefik.http.services.wud.loadbalancer.server.port=3000"
    environment:
      - TZ=${TZ}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r => r.ok ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  home_network:
    external: true
