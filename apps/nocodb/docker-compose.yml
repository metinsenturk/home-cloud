services:
  nocodb:
    image: nocodb/nocodb:latest
    container_name: nocodb
    restart: unless-stopped
    networks:
      - home_network
      - home_nocodb_network
    volumes:
      - home_nocodb_data:/usr/app/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nocodb.rule=Host(`nocodb.${DOMAIN}`)"
      - "traefik.http.services.nocodb.loadbalancer.server.port=8080"
      - "traefik.docker.network=home_network"
    environment:
      - NC_ADMIN_EMAIL=${NC_ADMIN_EMAIL}
      - NC_ADMIN_PASSWORD=${NC_ADMIN_PASSWORD}
      - NC_AUTH_JWT_SECRET=${NC_AUTH_JWT_SECRET}
      - NC_DB=pg://nocodb-db:5432?u=${POSTGRES_USER}&p=${POSTGRES_PASSWORD}&d=${POSTGRES_DB}
      - PORT=8080
    logging:
      driver: json-file
      options:
        max-size: "10m"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      nocodb-db:
        condition: service_healthy

  nocodb-db:
    image: postgres:17-alpine
    container_name: nocodb_db
    restart: unless-stopped
    networks:
      - home_nocodb_network
    volumes:
      - home_nocodb_db_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - TZ=${TZ}
    logging:
      driver: json-file
      options:
        max-size: "10m"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  home_network:
    name: home_network
    external: true
  home_nocodb_network:
    name: home_nocodb_network
    driver: bridge

volumes:
  home_nocodb_data:
    name: home_nocodb_data
  home_nocodb_db_data:
    name: home_nocodb_db_data
