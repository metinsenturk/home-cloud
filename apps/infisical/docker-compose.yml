services:
  infisical-db:
    image: postgres:16-alpine
    container_name: infisical_db
    restart: unless-stopped
    # PostgreSQL database for Infisical secret management.
    env_file:
      - .env
    networks:
      - home_infisical_network
    volumes:
      - home_infisical_db_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${INFISICAL_DB_USER}
      - POSTGRES_PASSWORD=${INFISICAL_DB_PASSWORD}
      - POSTGRES_DB=${INFISICAL_DB_NAME}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "$$POSTGRES_USER", "-d", "$$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  infisical-redis:
    image: redis:7-alpine
    container_name: infisical_redis
    restart: unless-stopped
    # Redis cache for Infisical.
    networks:
      - home_infisical_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  infisical:
    image: infisical/infisical:latest
    container_name: infisical
    restart: unless-stopped
    # Infisical provides centralized secret management with a web UI.
    # Requires PostgreSQL and Redis for operation.
    # This is the public-facing service that connects to home_network for Traefik routing.
    depends_on:
      infisical-db:
        condition: service_healthy
      infisical-redis:
        condition: service_healthy
    networks:
      - home_network
      - home_infisical_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.infisical.rule=Host(`secrets.${DOMAIN}`)"
      - "traefik.http.services.infisical.loadbalancer.server.port=8080"
      - "traefik.docker.network=home_network"
    environment:
      - TZ=${TZ}
      - DB_CONNECTION_URI=postgres://${INFISICAL_DB_USER}:${INFISICAL_DB_PASSWORD}@infisical-db:5432/${INFISICAL_DB_NAME}
      - REDIS_URL=redis://infisical-redis:6379
      - SITE_URL=http://secrets.${DOMAIN}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - AUTH_SECRET=${AUTH_SECRET}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    env_file:
      - .env

networks:
  home_network:
    external: true
  home_infisical_network:
    name: home_infisical_network
    driver: bridge

volumes:
  home_infisical_db_data:
    name: home_infisical_db_data