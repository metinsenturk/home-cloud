services:
  infisical-db:
    image: postgres:16-alpine
    container_name: infisical_db
    restart: unless-stopped
    # PostgreSQL database for Infisical secret management.
    env_file:
      - .env
    networks:
      - infisical_network
    volumes:
      - infisical_db_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${INFISICAL_DB_USER:-infisical}
      - POSTGRES_PASSWORD=${INFISICAL_DB_PASSWORD:-infisical}
      - POSTGRES_DB=${INFISICAL_DB_NAME:-infisical}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"

  infisical-redis:
    image: redis:7-alpine
    container_name: infisical_redis
    restart: unless-stopped
    # Redis cache for Infisical.
    networks:
      - infisical_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"

  infisical:
    image: infisical/infisical:latest
    container_name: infisical
    restart: unless-stopped
    # Infisical provides centralized secret management with a web UI.
    # Requires PostgreSQL and Redis for operation.
    # This is the public-facing service that connects to home_network for Traefik routing.
    depends_on:
      - infisical-db
      - infisical-redis
    env_file:
      - .env
    networks:
      - home_network
      - infisical_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.infisical.rule=Host(`secrets.${DOMAIN}`)"
      - "traefik.http.services.infisical.loadbalancer.server.port=8080"
    environment:
      - TZ=${TZ}
      - DB_CONNECTION_URI=postgres:// ${INFISICAL_DB_USER:-infisical}:${INFISICAL_DB_PASSWORD:-infisical}@infisical-db:5432/${INFISICAL_DB_NAME:-infisical}
      - REDIS_URL=redis://infisical-redis:6379
      - SITE_URL=http://secrets.${DOMAIN}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - AUTH_SECRET=${AUTH_SECRET}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"

networks:
  home_network:
    external: true
  infisical_network:
    driver: bridge

volumes:
  infisical_db_data:
