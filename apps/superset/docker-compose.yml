services:
  superset-postgres:
    image: postgres:17-alpine
    container_name: superset_postgres
    restart: unless-stopped
    networks:
      - home_superset_network
    volumes:
      - home_superset_postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DATABASE_DB}
      - POSTGRES_USER=${DATABASE_USER}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
    logging:
      driver: json-file
      options:
        max-size: "10m"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  superset-redis:
    image: redis:latest
    container_name: superset_redis
    restart: unless-stopped
    networks:
      - home_superset_network
    volumes:
      - home_superset_redis_data:/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  superset:
    image: apache/superset:latest
    container_name: superset
    restart: unless-stopped
    networks:
      - home_network
      - home_superset_network
    volumes:
      - home_superset_data:/app/superset_home
      - ./superset_config.py:/app/pythonpath_dev/superset_config_docker.py:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.superset.rule=Host(`superset.${DOMAIN}`)"
      - "traefik.http.services.superset.loadbalancer.server.port=8088"
      - "traefik.docker.network=home_network"
    environment:
      - DATABASE_DIALECT=${DATABASE_DIALECT}
      - DATABASE_USER=${DATABASE_USER}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_HOST=${DATABASE_HOST}
      - DATABASE_PORT=${DATABASE_PORT}
      - DATABASE_DB=${DATABASE_DB}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - SUPERSET_SECRET_KEY=${SUPERSET_SECRET_KEY}
      - SUPERSET_LOAD_EXAMPLES=${SUPERSET_LOAD_EXAMPLES}
      - CELERY_BROKER_URL=redis://${REDIS_HOST}:${REDIS_PORT}/0
      - CELERY_RESULT_BACKEND=redis://${REDIS_HOST}:${REDIS_PORT}/1
    logging:
      driver: json-file
      options:
        max-size: "10m"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 90s
    depends_on:
      superset-postgres:
        condition: service_healthy
      superset-redis:
        condition: service_healthy

  superset-worker:
    image: apache/superset:latest
    container_name: superset_worker
    restart: unless-stopped
    command: ["/app/docker/docker-bootstrap.sh", "worker"]
    networks:
      - home_superset_network
    volumes:
      - home_superset_data:/app/superset_home
      - ./superset_config.py:/app/pythonpath_dev/superset_config_docker.py:ro
    environment:
      - DATABASE_DIALECT=${DATABASE_DIALECT}
      - DATABASE_USER=${DATABASE_USER}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_HOST=${DATABASE_HOST}
      - DATABASE_PORT=${DATABASE_PORT}
      - DATABASE_DB=${DATABASE_DB}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - SUPERSET_SECRET_KEY=${SUPERSET_SECRET_KEY}
      - CELERYD_CONCURRENCY=2
      - CELERY_BROKER_URL=redis://${REDIS_HOST}:${REDIS_PORT}/0
      - CELERY_RESULT_BACKEND=redis://${REDIS_HOST}:${REDIS_PORT}/1
    logging:
      driver: json-file
      options:
        max-size: "10m"
    healthcheck:
      test: ["CMD-SHELL", "celery -A superset.tasks.celery_app:app inspect ping -d celery@$$HOSTNAME"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      superset:
        condition: service_healthy

  superset-worker-beat:
    image: apache/superset:latest
    container_name: superset_worker_beat
    restart: unless-stopped
    command: ["/app/docker/docker-bootstrap.sh", "beat"]
    networks:
      - home_superset_network
    volumes:
      - home_superset_data:/app/superset_home
      - ./superset_config.py:/app/pythonpath_dev/superset_config_docker.py:ro
    environment:
      - DATABASE_DIALECT=${DATABASE_DIALECT}
      - DATABASE_USER=${DATABASE_USER}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_HOST=${DATABASE_HOST}
      - DATABASE_PORT=${DATABASE_PORT}
      - DATABASE_DB=${DATABASE_DB}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - SUPERSET_SECRET_KEY=${SUPERSET_SECRET_KEY}
      - CELERY_BROKER_URL=redis://${REDIS_HOST}:${REDIS_PORT}/0
      - CELERY_RESULT_BACKEND=redis://${REDIS_HOST}:${REDIS_PORT}/1
    logging:
      driver: json-file
      options:
        max-size: "10m"
    healthcheck:
      disable: true
    depends_on:
      superset-worker:
        condition: service_healthy

networks:
  home_network:
    external: true
  home_superset_network:
    name: home_superset_network
    driver: bridge

volumes:
  home_superset_data:
    name: home_superset_data
  home_superset_postgres_data:
    name: home_superset_postgres_data
  home_superset_redis_data:
    name: home_superset_redis_data
