services:
  yopass:
    image: jhaals/yopass:latest
    container_name: yopass
    restart: unless-stopped
    networks:
      - home_network
      - home_yopass_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.yopass.rule=Host(`yopass.${DOMAIN}`)"
      - "traefik.http.services.yopass.loadbalancer.server.port=1337"
      - "traefik.docker.network=home_network"
    environment:
      TZ: ${TZ}
    # Enable metrics port (8080) for health checking
    command: ["--memcached=yopass-memcached:11211", "--metrics-port=8080"]
    healthcheck:
      # Use a TCP socket check since the image lacks a shell/curl
      test: ["CMD", "/yopass-server", "--help"] 
      # Alternative: If you have a separate monitoring container (like Traefik), 
      # check http://yopass:8080/metrics
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s    
    logging:
      driver: json-file
      options:
        max-size: "10m"
    depends_on:
      yopass-memcached:
        condition: service_started

  yopass-memcached:
    image: memcached:latest
    container_name: yopass_memcached
    restart: unless-stopped
    networks:
      - home_yopass_network
    logging:
      driver: json-file
      options:
        max-size: "10m"
    healthcheck:
      test: ["CMD-SHELL", "test -e /proc/net/tcp && grep -q 11211 /proc/net/tcp || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 2
      start_period: 5s

networks:
  home_network:
    external: true
  home_yopass_network:
    name: home_yopass_network
    driver: bridge
