services:
  pgbackweb-db:
    image: postgres:alpine
    container_name: pgbackweb_db
    restart: unless-stopped
    # PostgreSQL database for pgBackweb metadata storage.
    env_file:
      - .env
    networks:
      - home_pgbackweb_network
    volumes:
      - home_pgbackweb_db_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${PBW_DB_USER}
      - POSTGRES_PASSWORD=${PBW_DB_PASSWORD}
      - POSTGRES_DB=${PBW_DB_NAME}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PBW_DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  pgbackweb:
    image: eduardolat/pgbackweb:latest
    container_name: pgbackweb
    restart: unless-stopped
    # pgBackweb is a web interface for managing PostgreSQL backups.
    # It supports scheduled backups, S3 storage, PGP encryption, and webhooks.
    # This service connects to PostgreSQL for metadata and home_network for Traefik routing.
    depends_on:
      pgbackweb-db:
        condition: service_healthy
    networks:
      - home_network
      - home_pgbackweb_network
    volumes:
      - home_pgbackweb_backups:/backups
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pgbackweb.rule=Host(`pgbackweb.${DOMAIN}`)"
      - "traefik.http.services.pgbackweb.loadbalancer.server.port=8085"
      - "traefik.docker.network=home_network"
    environment:
      - TZ=${TZ}
      - PBW_ENCRYPTION_KEY=${PBW_ENCRYPTION_KEY}
      - PBW_POSTGRES_CONN_STRING=${PBW_POSTGRES_CONN_STRING}
      - PBW_LISTEN_HOST=0.0.0.0
      - PBW_LISTEN_PORT=8085
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "timeout 1s bash -c ':> /dev/tcp/127.0.0.1/8085' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    env_file:
      - .env

networks:
  home_network:
    external: true
  home_pgbackweb_network:
    name: home_pgbackweb_network
    driver: bridge

volumes:
  home_pgbackweb_db_data:
    name: home_pgbackweb_db_data
  home_pgbackweb_backups:
    name: home_pgbackweb_backups
