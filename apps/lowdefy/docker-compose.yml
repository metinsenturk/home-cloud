services:
  lowdefy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lowdefy
    restart: unless-stopped
    networks:
      - home_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lowdefy.rule=Host(`lowdefy.${DOMAIN}`)"
      - "traefik.http.services.lowdefy.loadbalancer.server.port=3000"
      - "traefik.docker.network=home_network"
    environment:
      - TZ=${TZ}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  home_network:
    external: true
