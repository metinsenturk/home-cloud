###############################################################################
# DNSMASQ CUSTOM CONFIGURATION: 99-wildcard.conf
#
# ABOUT .d DIRECTORIES:
# This file is located in a ".d" directory (likely /etc/dnsmasq.d/). These 
# directories allow you to add modular configuration snippets without editing 
# the main 'dnsmasq.conf' file. This makes updates easier and organization cleaner.
#
# FILE LOADING ORDER:
# Files in this directory are loaded in alphabetical/lexicographical order.
# The '99-' prefix ensures this file is loaded LAST. This is a common practice
# to ensure your custom rules take priority over or override previous settings.
#
# PURPOSE OF THIS FILE (99-wildcard.conf):
# Typically used to define "wildcard" DNS records. A wildcard allows you to
# point an entire domain and all its subdomains (e.g., *.test or *.local) 
# to a single IP address—perfect for local development or Pi-hole overrides.
#
# Usage Example: address=/.mydomain.test/192.168.1.10
###############################################################################