services:

  freqtrade:
    image: freqtradeorg/freqtrade:latest
    container_name: freqtrade
    restart: unless-stopped
    networks:
      - home_network
      - home_freqtrade_network
    volumes:
      - home_freqtrade_data:/freqtrade/user_data
      # Mount entrypoint.py script (read-only) to override image's default entrypoint
      # This allows automatic initialization of config.json on first start
      - ./entrypoint.py:/entrypoint.py:ro
      # Mount strategy downloader helper script
      - ./strategy_downloader.py:/strategy_downloader.py:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.freqtrade.rule=Host(`freqtrade.${DOMAIN}`)"
      - "traefik.http.services.freqtrade.loadbalancer.server.port=8080"
      - "traefik.docker.network=home_network"
    environment:
      # Database Configuration - Environment variables override config
      FREQTRADE__DB_URL: sqlite:////freqtrade/user_data/tradesv3.sqlite
      # API Server Configuration
      FREQTRADE__API_SERVER__ENABLED: "true"
      FREQTRADE__API_SERVER__LISTEN_IP_ADDRESS: "0.0.0.0"
      FREQTRADE__API_SERVER__LISTEN_PORT: 8080
      FREQTRADE__API_SERVER__USERNAME: ${FREQTRADE_API_USERNAME}
      FREQTRADE__API_SERVER__PASSWORD: ${FREQTRADE_API_PASSWORD}
      FREQTRADE__API_SERVER__JWT_SECRET_KEY: ${FREQTRADE_JWT_SECRET}
      FREQTRADE__API_SERVER__WS_TOKEN: ${FREQTRADE_WS_TOKEN}
      # Telegram Configuration
      FREQTRADE__TELEGRAM__ENABLED: ${FREQTRADE_TELEGRAM_ENABLED}
      FREQTRADE__TELEGRAM__TOKEN: ${FREQTRADE_TELEGRAM_TOKEN}
      FREQTRADE__TELEGRAM__CHAT_ID: ${FREQTRADE_TELEGRAM_CHAT_ID}
    logging:
      driver: json-file
      options:
        max-size: "10m"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/ping"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 60s
    # === ENTRYPOINT OVERRIDE MECHANISM ===
    # The image's default entrypoint is freqtrade. We override it with our Python script.
    # Docker combines entrypoint + command into a single invocation:
    #   entrypoint: python3 /entrypoint.py
    #   command: freqtrade trade --config ...
    # Results in: python3 /entrypoint.py freqtrade trade --config ...
    #
    # Flow:
    #   1. entrypoint.py starts (this script)
    #   2. It receives sys.argv[1:] = ['freqtrade', 'trade', '--config', ...]
    #   3. Script checks if config.json exists; if not, auto-initializes it
    #   4. Script then launches freqtrade: subprocess.run(['freqtrade', 'trade', '--config', ...])
    #   5. freqtrade runs with the initialized config
    #
    # Why override?
    #   - The freqtradeorg/freqtrade image doesn't auto-initialize on first start
    #   - Without this, you'd manually need to run: create-userdir + new-config + start
    #   - This automation makes the container "just work" on first launch
    entrypoint: python3 /entrypoint.py
    command: freqtrade trade --config user_data/config.json --strategy SampleStrategy
    # depends_on:
    #   freqtrade-postgres:
    #     condition: service_healthy    

networks:
  home_network:
    name: home_network
    driver: bridge
    external: true
  home_freqtrade_network:
    name: home_freqtrade_network
    driver: bridge

volumes:
  home_freqtrade_data:
    name: home_freqtrade_data