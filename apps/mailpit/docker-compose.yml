services:
  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit
    restart: unless-stopped
    networks:
      - home_network
    volumes:
      - home_mailpit_data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mailpit.rule=Host(`mailpit.${DOMAIN}`)"
      - "traefik.http.services.mailpit.loadbalancer.server.port=8025"
      - "traefik.docker.network=home_network"
    environment:
      - TZ=${TZ}
    logging:
      driver: json-file
      options:
        max-size: "10m"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8025/readyz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  home_network:
    external: true

volumes:
  home_mailpit_data:
    name: home_mailpit_data
